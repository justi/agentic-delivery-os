decisions:
  - text: "5-part scope: (1) cross-doc consistency fixes, (2) decision records standard, (3) document templates, (4) onboarding guide, (5) bootstrap agent+command"
    date: "2026-03-10"
  - text: "@bootstrapper agent + /bootstrap command (not command-only). Multi-session stateful workflow with human interview loops, persistent context via .ai/local/bootstrapper-context.yaml."
    date: "2026-03-10"
  - text: "Templates in doc/templates/ (Option C) — templates define structure (customizable per project), agent prompts define quality rules. Agents read templates at runtime, fallback to embedded defaults."
    date: "2026-03-10"
  - text: "Decision records at doc/decisions/ (not doc/adr/) — tracker-agnostic, supports ADR/PDR/TDR/BDR/ODR types. Synthesized from Menuvivo MVDR system."
    date: "2026-03-10"
  - text: "Tribal knowledge extraction moved to separate ticket GH-33."
    date: "2026-03-10"
  - text: "OQ-1 resolved (PM-decided): Bootstrapper copies handbook as-is (per §1 'keep identical across repos'). Projects can customize after initial bootstrap."
    date: "2026-03-10"
  - text: "OQ-2 resolved (PM-decided): Create doc/guides/copywriting.md as minimal stub. Prevents ghost reference from @pm agent. Can be expanded later."
    date: "2026-03-10"
  - text: "OQ-3 resolved (PM-decided): Decision IDs use type prefix + zero-padded 4-digit (ADR-0001, PDR-0001, etc.). Consistent with existing ADR-#### convention, extended to all types."
    date: "2026-03-10"
