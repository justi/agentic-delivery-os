    date: "2026-03-07"
  - text: "Tools convention guide: doc/guides/tools-convention.md — PM writes initial version directly to preserve context; part of GH-26"
    date: "2026-03-07"
  - text: "Design principle: tools are standalone, agent-agnostic CLIs. Not coupled to OpenCode, Claude Code, or any specific AI tool. Any user or agent can invoke from terminal."
    date: "2026-03-07"
