  - text: "Script error messages for unconfigured providers link to provider-specific doc section on GitHub"
    date: "2026-03-07"
  - text: "Version check: auto-check from GitHub raw, 24h cache in config dir, silent failure, opt-out via TEXT_TO_IMAGE_NO_VERSION_CHECK=true"
    date: "2026-03-07"
