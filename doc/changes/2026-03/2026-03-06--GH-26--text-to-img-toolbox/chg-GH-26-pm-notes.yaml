  - text: "AGENTS.md split into separate ticket GH-27, delivered first to establish conventions"
    date: "2026-03-06"
  - text: "Agent tuning scope: model discovery (--list-models with availability check), task-based routing table (production vs draft), updated CLI reference"
    date: "2026-03-06"
  - text: "add-header-location.sh enhancement: detect bash scripts by .sh extension or shebang line"
    date: "2026-03-06"
  - text: "License header: standard ADOS copyright+MIT+latest-version-URL, same as agent prompts"
    date: "2026-03-06"
  - text: "Config dir renamed to ~/.ai/text-to-image/ (consistent with tool name)"
    date: "2026-03-07"
  - text: "--version output: multi-line with name+version, copyright, MIT, latest-version URL"
    date: "2026-03-07"
  - text: "--help output: includes basic examples, link to doc on GitHub, and license info at bottom"
    date: "2026-03-07"
  - text: "User doc (doc/tools/text-to-image.md): per-provider setup with sign-up URL, console URL, env var, gotchas, pricing. Stable markdown headings for deterministic GitHub anchors."
