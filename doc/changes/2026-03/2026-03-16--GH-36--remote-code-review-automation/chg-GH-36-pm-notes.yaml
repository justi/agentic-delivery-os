  - text: "Reuse @pr-manager patterns for platform detection, tmp/ workspace conventions, and CLI reference. Review for efficiency during design."
    date: "2026-03-16"
  - text: "Ticket's 'PM must use @toolsmith' → corrected to standard ADOS flow: @coder executes plan and delegates to @toolsmith as needed."
    date: "2026-03-16"
  - text: "Ticket's embedded 4-phase implementation plan → treated as input context for spec-writer, not the actual plan."
    date: "2026-03-16"
  - text: "GH-39 scope merged into GH-36: extract hardcoded platform access into .ai/agent/pr-instructions.md. Reopened delivery phase. GH-39 closed as duplicate."
    date: "2026-03-16"
